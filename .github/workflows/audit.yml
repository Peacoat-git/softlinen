name: Portfolio Health Audit

# Runs every 12 hours. Checks all 9 sites for:
#   - Publish workflow status / staleness
#   - Video workflow status / staleness
#   - Site HTTP reachability
#   - Article counts
# Writes health.json (read by dashboard) and opens a GitHub Issue on failures.
# Auto-closes the issue when all systems are healthy again.

on:
  schedule:
    - cron: '0 */12 * * *'   # 00:00 and 12:00 UTC daily
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'Manual audit'

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run audit
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_GH_TOKEN }}
        run: python audit.py

      - name: Commit health.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add health.json
          git diff --staged --quiet || git commit -m "chore: health audit [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin main
          git push
